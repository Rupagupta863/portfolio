<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    </style>
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1e2f" />
            <stop offset="100%" stop-color="#0b0b13" />
        </linearGradient>
        <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#8b5cf6" />
        </linearGradient>
    </defs>
    
    <rect width="512" height="512" rx="140" fill="url(#bg)" />
    <!-- Gradient Inner border -->
    <rect width="472" height="472" x="20" y="20" rx="120" fill="none" stroke="url(#text)" stroke-width="8" opacity="0.6" />
    
    <!-- Text logic -->
    <text x="50%" y="54%" font-family="'Space Grotesk', system-ui, sans-serif" font-size="240" font-weight="700" fill="url(#text)" letter-spacing="-10" text-anchor="middle" dominant-baseline="middle">RG</text>
</svg>
